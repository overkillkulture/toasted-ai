<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAOC - Maritime & Aviation Operations Center</title>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0f;
            color: #00ff88;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(90deg, #001a00, #003300);
            padding: 15px 30px;
            border-bottom: 2px solid #00ff88;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 1.5rem; letter-spacing: 3px; }
        .status { font-size: 0.8rem; }
        .status.online { color: #00ff88; }
        .status.offline { color: #ff4444; }
        .container { display: flex; height: calc(100vh - 60px); }
        .sidebar {
            width: 350px;
            background: #0d1117;
            border-right: 1px solid #00ff44;
            overflow-y: auto;
            padding: 15px;
        }
        .map-container { flex: 1; position: relative; }
        #map { height: 100%; width: 100%; }
        .panel { margin-bottom: 20px; }
        .panel h3 {
            color: #00ffaa;
            border-bottom: 1px solid #00ff44;
            padding-bottom: 8px;
            margin-bottom: 10px;
            font-size: 0.9rem;
            letter-spacing: 2px;
        }
        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .stat-box {
            background: #161b22;
            padding: 10px;
            border: 1px solid #30363d;
            text-align: center;
        }
        .stat-box .value { font-size: 1.5rem; color: #00ff88; }
        .stat-box .label { font-size: 0.7rem; color: #8b949e; }
        .item-list { max-height: 300px; overflow-y: auto; }
        .item {
            background: #161b22;
            padding: 8px;
            margin-bottom: 5px;
            border-left: 3px solid #00ff88;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .item:hover { background: #21262d; }
        .item.aircraft { border-color: #58a6ff; }
        .item.vessel { border-color: #f78166; }
        .search-box {
            width: 100%;
            padding: 10px;
            background: #161b22;
            border: 1px solid #30363d;
            color: #00ff88;
            font-family: inherit;
            margin-bottom: 15px;
        }
        .search-box:focus { outline: none; border-color: #00ff88; }
        .legend {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(13, 17, 23, 0.9);
            padding: 15px;
            border: 1px solid #30363d;
            z-index: 1000;
        }
        .legend-item { display: flex; align-items: center; margin: 5px 0; font-size: 0.8rem; }
        .legend-color { width: 15px; height: 15px; margin-right: 8px; border-radius: 50%; }
        .legend-color.aircraft { background: #58a6ff; }
        .legend-color.vessel { background: #f78166; }
        .refresh-btn {
            background: #00ff88;
            color: #0a0a0f;
            border: none;
            padding: 8px 20px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
        }
        .refresh-btn:hover { background: #00cc6a; }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>⛵ MAOC - OPERATIONS CENTER</h1>
            <div class="status online">● LIVE TRACKING</div>
        </div>
        <div>
            <button class="refresh-btn" onclick="refreshData()">⟳ REFRESH</button>
        </div>
    </div>
    
    <div class="container">
        <div class="sidebar">
            <input type="text" class="search-box" placeholder="Search callsign, name, MMSI..." id="searchInput" onkeyup="handleSearch()">
            
            <div class="panel">
                <h3>📊 STATISTICS</h3>
                <div class="stat-grid">
                    <div class="stat-box">
                        <div class="value" id="aircraftCount">0</div>
                        <div class="label">AIRCRAFT</div>
                    </div>
                    <div class="stat-box">
                        <div class="value" id="vesselCount">0</div>
                        <div class="label">VESSELS</div>
                    </div>
                    <div class="stat-box">
                        <div class="value" id="avgAltitude">0</div>
                        <div class="label">AVG ALT (ft)</div>
                    </div>
                    <div class="stat-box">
                        <div class="value" id="avgSpeed">0</div>
                        <div class="label">AVG KNOTS</div>
                    </div>
                </div>
            </div>
            
            <div class="panel">
                <h3>✈️ AIRCRAFT</h3>
                <div class="item-list" id="aircraftList"></div>
            </div>
            
            <div class="panel">
                <h3>🚢 VESSELS</h3>
                <div class="item-list" id="vesselList"></div>
            </div>
        </div>
        
        <div class="map-container">
            <div id="map"></div>
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-color aircraft"></div>
                    <span>✈️ Aircraft</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color vessel"></div>
                    <span>🚢 Vessels</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Initialize map
        const map = L.map('map').setView([30, -40], 3);
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap, © CARTO',
            maxZoom: 19
        }).addTo(map);
        
        const aircraftMarkers = [];
        const vesselMarkers = [];
        
        // Custom icons
        const aircraftIcon = L.divIcon({
            className: 'aircraft-marker',
            html: '✈️',
            iconSize: [20, 20],
            iconAnchor: [10, 10]
        });
        
        const vesselIcon = L.divIcon({
            className: 'vessel-marker',
            html: '🚢',
            iconSize: [20, 20],
            iconAnchor: [10, 10]
        });
        
        async function refreshData() {
            try {
                const response = await fetch('/api/maoc-data');
                const data = await response.json();
                
                // Update stats
                document.getElementById('aircraftCount').textContent = data.overview?.air_traffic?.aircraft_count || 0;
                document.getElementById('vesselCount').textContent = data.overview?.maritime?.vessel_count || 0;
                document.getElementById('avgAltitude').textContent = Math.round(data.overview?.air_traffic?.avg_altitude || 0);
                document.getElementById('avgSpeed').textContent = Math.round(data.overview?.maritime?.avg_speed || 0);
                
                // Clear markers
                aircraftMarkers.forEach(m => map.removeLayer(m));
                vesselMarkers.forEach(m => map.removeLayer(m));
                aircraftMarkers.length = 0;
                vesselMarkers.length = 0;
                
                // Add aircraft
                const aircraftList = document.getElementById('aircraftList');
                aircraftList.innerHTML = '';
                
                (data.aircraft || []).forEach(ac => {
                    if (ac.latitude && ac.longitude) {
                        const marker = L.marker([ac.latitude, ac.longitude], {icon: aircraftIcon})
                            .addTo(map)
                            .bindPopup(`
                                <b>${ac.callsign}</b><br>
                                Country: ${ac.origin_country}<br>
                                Altitude: ${ac.altitude} ft<br>
                                Speed: ${ac.velocity} kts<br>
                                Heading: ${Math.round(ac.heading)}°
                            `);
                        aircraftMarkers.push(marker);
                    }
                    
                    const item = document.createElement('div');
                    item.className = 'item aircraft';
                    item.innerHTML = `<b>${ac.callsign}</b><br>${ac.origin_country}<br>Alt: ${ac.altitude}ft`;
                    item.onclick = () => {
                        if (ac.latitude && ac.longitude) {
                            map.setView([ac.latitude, ac.longitude], 8);
                        }
                    };
                    aircraftList.appendChild(item);
                });
                
                // Add vessels
                const vesselList = document.getElementById('vesselList');
                vesselList.innerHTML = '';
                
                (data.vessels || []).forEach(v => {
                    if (v.latitude && v.longitude) {
                        const marker = L.marker([v.latitude, v.longitude], {icon: vesselIcon})
                            .addTo(map)
                            .bindPopup(`
                                <b>${v.name}</b><br>
                                Type: ${v.type}<br>
                                Flag: ${v.flag}<br>
                                Speed: ${v.speed.toFixed(1)} kts<br>
                                DWT: ${v.dwt}
                            `);
                        vesselMarkers.push(marker);
                    }
                    
                    const item = document.createElement('div');
                    item.className = 'item vessel';
                    item.innerHTML = `<b>${v.name}</b><br>${v.type}<br>${v.flag}`;
                    item.onclick = () => {
                        if (v.latitude && v.longitude) {
                            map.setView([v.latitude, v.longitude], 8);
                        }
                    };
                    vesselList.appendChild(item);
                });
                
            } catch (e) {
                console.error('Error loading data:', e);
            }
        }
        
        function handleSearch() {
            // Search functionality
            const query = document.getElementById('searchInput').value.toLowerCase();
            // Filter displayed items
            document.querySelectorAll('.item').forEach(item => {
                item.style.display = item.textContent.toLowerCase().includes(query) ? 'block' : 'none';
            });
        }
        
        // Auto-refresh every 30 seconds
        refreshData();
        setInterval(refreshData, 30000);
    </script>
</body>
</html>
